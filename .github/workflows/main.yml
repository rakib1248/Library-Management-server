name: CI/CD Pipeline

on:
  push:
    # ব্রাঞ্চের নাম আপনার 'main' বা 'master' যা আছে তা দিন। স্ক্রিনশট অনুযায়ী 'main' মনে হচ্ছে।
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        # এই লাইনটি ঠিক করে 'setup-node' করা হয়েছে
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run Prisma Generate
        run: pnpm prisma generate

      - name: Build project
        env:
          DATABASE_URL: postgresql://postgres:admin@localhost:5432/library?schema=public
          # গিটহাব সিক্রেটস এ JWT_SECRET অবশ্যই যোগ করে নেবেন
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: pnpm run build

      - name: Create temporary .env file
        run: |
          echo "DATABASE_URL=postgresql://postgres:admin@db:5432/library?schema=public" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "PORT=5000" >> .env

      - name: Run Docker Compose Test
        # বিল্ড শেষে আমরা ডকার কম্পোজ রান করে চেক করি
        run: docker compose up --build -d
